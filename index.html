<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>West Coastal Home Care</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
  <div class="page">

    <header class="header">
      <img src="images/LogoWeb.png" alt="West Coastal Home Care Logo" class="logo">
      <p>Home Watch & Keyholding for Holiday Homes and Empty Properties</p>
      <p class="hint">Tap a plan to message on WhatsApp</p>
    </header>

    <main class="main">
      <div class="image-wrapper">
        <div class="cards">
          <a class="card" target="_blank">
            <div class="card-inner">
              <div class="card-front">
                <img src="images/Card-Front-Extras.png" alt="Extras Plan">
              </div>
              <div class="card-back">
                <img src="images/Card-Back-Extras.png" alt="Extras Plan">
              </div>
            </div>
          </a>

          <a class="card" target="_blank">
            <div class="card-inner">
              <div class="card-front">
                <img src="images/Card-Front-Essential.png" alt="Essential Plan">
              </div>
              <div class="card-back">
                <img src="images/Card-Back-Essential.png" alt="Essential Plan">
              </div>
            </div>
          </a>

          <a class="card" target="_blank">
            <div class="card-inner">
              <div class="card-front">
                <img src="images/Card-Front-Comfort.png" alt="Comfort Plan">
              </div>
              <div class="card-back">
                <img src="images/Card-Back-Comfort.png" alt="Comfort Plan">
              </div>
            </div>
          </a>

          <a class="card" target="_blank">
            <div class="card-inner">
              <div class="card-front">
                <img src="images/Card-Front-Premium.png" alt="Premium Plan">
              </div>
              <div class="card-back">
                <img src="images/Card-Back-Premium.png" alt="Premium Plan">
              </div>
            </div>
          </a>

  </div>

    </div>
    </main>

    <footer class="footer">
      <p>📍 Barril/Ericeira + nearby areas</p>
      <p>📲 WhatsApp: +351 936 709 589 · 📧 westcoastalhomecare@gmail.com</p>
      <p>
        <a href="https://www.instagram.com/westcoastalhomecare" target="_blank" class="instagram-link">
          <i class="fab fa-instagram instagram-icon"></i>
        </a>
      </p>
    </footer>

    <!-- Botão FAQ -->
    <button id="faqBtn" class="faq-btn" title="FAQ">?</button>

    <!-- Modal FAQ -->
    <div id="faqModal" class="modal hidden">
      <div class="modal-content">

        <div class="modal-header">
          <div>
            <h2>FAQ</h2>
            <p class="modal-subtitle">West Coastal Home Care</p>
          </div>
          <button id="closeFaq" class="close-btn" aria-label="Close FAQ">✕</button>
        </div>

        <div class="faq-list" id="faqList"></div>

        <a id="faqWhatsapp" class="wa-btn" target="_blank">
          Message on WhatsApp
        </a>

      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
